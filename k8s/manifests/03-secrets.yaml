---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: internal-haproxy-openmanager
  labels:
    app: haproxy-openmanager
    component: postgres
type: Opaque
data:
  # postgres
  POSTGRES_DB: aGFwcm94eV9vcGVuX21hbmFnZXI=  # haproxy_openmanager
  POSTGRES_USER: aGFwcm94eV91c2Vy  # haproxy_user
  POSTGRES_PASSWORD: aGFwcm94eV9wYXNz  # haproxy_pass
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: internal-haproxy-openmanager
  labels:
    app: haproxy-openmanager
    component: backend
type: Opaque
# Both values are replaced at deploy time by the CI/CD pipeline (sed step)
# before `kubectl apply` runs. Never commit real secrets — use the placeholders.
stringData:
  SECRET_KEY: secret_key_replace_me
  MFA_ENCRYPTION_KEY: mfa_encryption_key_replace_me
